name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-gradle:
    name: Android Gradle Checks
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Run Android JVM tests
      run: ./gradlew --no-daemon :app:testDebugUnitTest

    - name: Run Android no-network integration tests
      run: ./gradlew --no-daemon :app:androidNoNetworkIntegrationTest

    - name: Run Android lint
      run: ./gradlew --no-daemon :app:lintDebug

    - name: Build Android release APK
      run: ./gradlew --no-daemon :app:assembleRelease

  android-managed-device-tests:
    name: Android Managed Device Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: android

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run Android managed-device tests
      run: ./gradlew --no-daemon :app:pixel2Api35DebugAndroidTest

  integration-tests:
    name: Integration Tests with Live Mints
    runs-on: macos-26
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.5'
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # NOTE: CDK mint integration is temporarily disabled — cashubtc/cdk only
    # ships Linux prebuilt binaries (no macOS arm64), and building from source
    # on the macOS runner is too slow/flaky. Re-enable once a macOS binary
    # is published. Nutshell remains the live mint under test.
    - name: Setup Nutshell mint (pip install)
      run: |
        cd CI
        chmod +x setup-nutshell.sh
        ./setup-nutshell.sh

    - name: Start mints
      run: |
        cd CI
        chmod +x start-nutshell.sh
        ./start-nutshell.sh

    - name: Wait for mints to be ready
      run: |
        echo "Waiting for mints to initialize..."

        # Check Nutshell
        for i in {1..30}; do
          if curl -sf http://localhost:3338/v1/info > /dev/null 2>&1; then
            echo "✓ Nutshell mint is ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "✗ Nutshell mint failed to start"
            cat CI/.nutshell.log 2>/dev/null || true
            exit 1
          fi
          echo "Waiting for Nutshell... ($i/30)"
          sleep 1
        done

    - name: Run CDK Swift Integration Tests (SPM)
      env:
        NUTSHELL_MINT_URL: http://localhost:3338
      run: |
        set -o pipefail
        cd CI/IntegrationTests
        swift test 2>&1 | tee ../../spm-integration-test-output.log

    # Ad-hoc signing ("-") on the simulator applies the app entitlements
    # (keychain-access-groups) without a team/profile — required so the wallet
    # can write its mnemonic to the Keychain during UI tests.
    - name: Build iOS app
      run: |
        set -o pipefail
        xcodebuild clean build-for-testing \
          -project CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination 'platform=iOS Simulator,name=iPhone 17' \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee build-output.log | xcbeautify

    - name: Run Integration Tests (Nutshell mint)
      env:
        NUTSHELL_MINT_URL: http://localhost:3338
      run: |
        set -o pipefail
        xcodebuild test-without-building \
          -project CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination 'platform=iOS Simulator,name=iPhone 17' \
          -only-testing:CashuWalletTests \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee integration-test-output.log | xcbeautify

    - name: Run UI Integration Tests
      env:
        NUTSHELL_MINT_URL: http://localhost:3338
      run: |
        set -o pipefail
        xcodebuild test-without-building \
          -project CashuWallet.xcodeproj \
          -scheme CashuWallet \
          -destination 'platform=iOS Simulator,name=iPhone 17' \
          -only-testing:CashuWalletUITests \
          -parallel-testing-enabled NO \
          CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="-" \
          | tee ui-test-output.log | xcbeautify

    - name: Stop mints
      if: always()
      run: |
        cd CI
        chmod +x stop-nutshell.sh
        ./stop-nutshell.sh
        
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ github.sha }}
        path: |
          *-test-output.log
          spm-integration-test-output.log
          
    - name: Upload mint logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: mint-logs-${{ github.sha }}
        path: |
          CI/.nutshell.log
